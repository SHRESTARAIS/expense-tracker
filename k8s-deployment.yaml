# ══════════════════════════════════════════════════════════════════════════════
# k8s-deployment.yaml – Kubernetes manifests for GKE deployment
# Apply: kubectl apply -f k8s-deployment.yaml
# ══════════════════════════════════════════════════════════════════════════════

---
# ConfigMap: non-secret config values
apiVersion: v1
kind: ConfigMap
metadata:
  name: expense-tracker-config
data:
  FLASK_ENV: "production"
  GCS_BUCKET: "your-bucket-name"   # REPLACE

---
# Secret: sensitive credentials (base64-encode values)
# Encode: echo -n "your-value" | base64
apiVersion: v1
kind: Secret
metadata:
  name: expense-tracker-secrets
type: Opaque
stringData:
  SECRET_KEY: "REPLACE_WITH_STRONG_SECRET"
  DATABASE_URL: "mysql+pymysql://user:password@cloud-sql-proxy:3306/expense_db"

---
# Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: expense-tracker
  labels:
    app: expense-tracker
spec:
  replicas: 2    # Horizontal scaling: 2 pods
  selector:
    matchLabels:
      app: expense-tracker
  template:
    metadata:
      labels:
        app: expense-tracker
    spec:
      containers:
      - name: expense-tracker
        image: gcr.io/YOUR_PROJECT_ID/expense-tracker:latest  # REPLACE
        ports:
        - containerPort: 8080
        envFrom:
        - configMapRef:
            name: expense-tracker-config
        - secretRef:
            name: expense-tracker-secrets
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        readinessProbe:
          httpGet:
            path: /auth/login
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /auth/login
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 15

---
# Service: LoadBalancer exposes app externally
apiVersion: v1
kind: Service
metadata:
  name: expense-tracker-service
spec:
  selector:
    app: expense-tracker
  type: LoadBalancer
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8080

---
# HorizontalPodAutoscaler: auto-scale based on CPU
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: expense-tracker-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: expense-tracker
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 60
